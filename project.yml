name: VoiceWritter

options:
  bundleIdPrefix: com.sadmansoumik
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  argmax-oss-swift:
    url: https://github.com/argmaxinc/argmax-oss-swift
    from: "1.0.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: "3.31.3"
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: "0.9.0"
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.3.0"

targets:
  VoiceWritter:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    scheme:
      testTargets: []
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_NAME: VoiceWritter
        PRODUCT_BUNDLE_IDENTIFIER: com.sadmansoumik.voicewritter
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Config/Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/VoiceWritter.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_VERSION: "5.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        DEAD_CODE_STRIPPING: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    dependencies:
      - package: argmax-oss-swift
        product: WhisperKit
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
